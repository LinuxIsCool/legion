context.modules = [
  {
    name = libpipewire-module-loopback
    args = {
      audio.position = [ FL FR ]
      capture.props = {
        media.class       = "Audio/Sink"
        node.name         = "claude-voice-sink"
        node.description  = "Claude Voice"
      }
      playback.props = {
        node.name    = "claude-voice-sink.output"
        node.passive = true
        audio.position = [ FL FR ]
        # task-513 followup 2026-05-17: removed hard-pin to Bluebass MAC
        # (bluez_output.E4_67_64_54_FE_74.1). Previously when a different
        # bluetooth headset (Champion 2 MAC 23_04_09_10_0C_39.1) connected,
        # this sink stayed corked + SUSPENDED because the pinned target was
        # unreachable, and TTS playback silently dropped. Letting target
        # fall through to system default fixes auto-follow on headset swap.
      }
    }
  }
]
