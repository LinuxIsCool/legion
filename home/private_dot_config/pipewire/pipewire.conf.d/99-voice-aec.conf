# claude-voice Acoustic Echo Cancellation (Phase 3)
#
# Uses monitor.mode to capture the reference signal from the default
# output device's monitor port. No separate sink/playback nodes needed.
# This avoids double-routing audio (which causes robotic artifacts).
#
# Pipeline:
#   C920 mic → AEC capture → [WebRTC AEC] → AEC source (default mic)
#                                   ↑
#                     HDMI monitor port (what speakers are playing)
#
# Claude Code /voice captures from default source (AEC source).
# TTS continues playing to claude-voice-sink → HDMI as before.
# AEC reads what HDMI is playing via monitor port, no routing change.

context.modules = [
  { name = libpipewire-module-echo-cancel
    args = {
      library.name = aec/libspa-aec-webrtc

      # Monitor mode: capture reference from output device monitor port
      # instead of creating a separate sink. Avoids double-routing.
      monitor.mode = true

      # Capture: reads from physical mic (C920 webcam)
      capture.props = {
        node.name        = "voice-aec-capture"
        node.description = "Voice AEC Capture (from mic)"
        audio.rate       = 16000
        audio.channels   = 1
        audio.position   = [ MONO ]
      }

      # Source: virtual mic output (clean, echo-cancelled)
      source.props = {
        node.name        = "voice-aec-source"
        node.description = "Clean Mic (echo cancelled)"
        audio.rate       = 16000
        audio.channels   = 1
        audio.position   = [ MONO ]
      }

      # Playback: monitor reference signal
      # In monitor.mode, this captures from the default sink's monitor
      playback.props = {
        node.name        = "voice-aec-playback"
        node.description = "Voice AEC Monitor (reference)"
        audio.rate       = 48000
        audio.channels   = 2
        audio.position   = [ FL FR ]
      }
    }
  }
]
