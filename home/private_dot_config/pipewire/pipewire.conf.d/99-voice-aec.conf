# claude-voice Acoustic Echo Cancellation (Phase 3)
#
# Creates virtual audio nodes using WebRTC echo cancellation:
#   - "Voice AEC Source" — clean mic output (echo-cancelled)
#   - "Voice AEC Sink" — reference signal input (what speakers play)
#
# How it works:
#   1. Module captures from physical mic (C920 webcam)
#   2. Module monitors what's playing on the default output (HDMI)
#   3. WebRTC AEC subtracts the playback signal from the mic signal
#   4. Result: clean mic audio without TTS bleed
#
# Claude Code /voice captures from default source.
# Set "Voice AEC Source" as default source so all mic capture is clean.
#
# To enable:  Copy to pipewire.conf.d/ and restart PipeWire
# To disable: Rename to .disabled
# To set default: wpctl set-default <aec-source-id>

context.modules = [
  { name = libpipewire-module-echo-cancel
    args = {
      # WebRTC echo cancellation (only supported backend)
      library.name = aec/libspa-aec-webrtc

      # Capture: reads from physical mic
      # WirePlumber will auto-connect to default source if no target set
      capture.props = {
        node.name        = "voice-aec-capture"
        node.description = "Voice AEC Capture (from mic)"
        audio.rate       = 16000
        audio.channels   = 1
        audio.position   = [ MONO ]
      }

      # Source: virtual mic output (clean, echo-cancelled)
      # Applications capture from this instead of raw mic
      source.props = {
        node.name        = "voice-aec-source"
        node.description = "Clean Mic (echo cancelled)"
        audio.rate       = 16000
        audio.channels   = 1
        audio.position   = [ MONO ]
      }

      # Sink: virtual speaker input (reference for cancellation)
      # TTS playback routes through here so AEC knows what to subtract
      sink.props = {
        node.name        = "voice-aec-sink"
        node.description = "Voice AEC Reference (TTS playback)"
        audio.rate       = 48000
        audio.channels   = 2
        audio.position   = [ FL FR ]
      }

      # Playback: outputs the reference signal to real speakers
      playback.props = {
        node.name        = "voice-aec-playback"
        node.description = "Voice AEC Playback (to speakers)"
        node.passive     = true
      }
    }
  }
]
