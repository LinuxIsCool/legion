# plugins.conf — TPM declarations + plugin config
# 8 plugins (restored text-macros emoji picker; dropped copycat, fzf)

# ── Plugin declarations ──────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'linuxiscool/tmux-power'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'linuxiscool/tmux-text-macros'

# ── tmux-power (status bar theme) ────────────────────────
set -g @tmux_power_theme 'snow'
set -g @tmux_power_date_icon '🍂  %A %B %d'
set -g @tmux_power_time_icon '⌚'
set -g @tmux_power_user_icon '🍄'
set -g @tmux_power_session_icon '✨'
set -g @tmux_power_upload_speed_icon ''
set -g @tmux_power_download_speed_icon ''
set -g @tmux_power_left_arrow_icon ''
set -g @tmux_power_right_arrow_icon ''
set -g @tmux_power_prefix_highlight_pos 'LR'
set -g @tmux_power_show_upload_speed false
set -g @tmux_power_show_download_speed false

# ── tmux-prefix-highlight ────────────────────────────────
set -ag status-right "#{prefix_highlight}"

# ── tmux-yank ────────────────────────────────────────────
set -g @yank_action 'copy-pipe'

# ── tmux-continuum + resurrect ───────────────────────────
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Restore claude sessions via wrapper that resumes previous session by ID.
# claude-restore.sh reads ~/.local/share/tmux/claude-sessions/<key>.state
# and calls `claude --resume <session_id>`, falling back to --continue.
set -g @resurrect-processes '"~claude->~/.claude/plugins/local/legion-plugins/plugins/claude-tmux/scripts/claude-restore.sh"'

# On every resurrect save, consolidate pane state files into session-map.tsv
set -g @resurrect-hook-post-save-layout '~/.claude/plugins/local/legion-plugins/plugins/claude-tmux/scripts/claude-save-sessions.sh'

# ── Claude Code tmux integration (emoji window names) ────
run-shell -b "sleep 1 && ~/.config/tmux/plugins/claude-tmux/scripts/claude-tmux-setup.sh"

# ── Initialize TPM (MUST be last line) ───────────────────
run -b "~/.config/tmux/plugins/tpm/tpm"
