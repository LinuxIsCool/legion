# keys.conf — all keybindings (vim-centric)
# Ported from old keys.tmux, clipboard updated for Wayland (wl-copy)

# ── Prefix ────────────────────────────────────────────────
unbind C-b
set -g prefix ^A

# ── Window management ────────────────────────────────────
unbind ^C
bind c new-window -c '#{pane_current_path}'

# Arrow key navigation (no prefix needed)
bind -n C-up switch-client -n
bind -n C-down switch-client -p
bind -n C-left prev
bind -n C-right next
bind -n S-Left { swap-window -t -1; previous-window }
bind -n S-Right { swap-window -t +1; next-window }

unbind p
bind p previous-window

# ── Pane management ──────────────────────────────────────
# Split like vim (preserves path)
bind s split-window -v -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'

# Navigate panes with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
unbind l
bind l select-pane -R

# Resize panes with Ctrl+Alt+hjkl (no prefix needed)
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# Break pane into its own window
unbind b
bind b break-pane

# Kill pane
unbind x
bind x kill-pane
bind C-x kill-pane -a

# Rename pane
bind P command-prompt -p "(rename-pane)" -I "#T" "select-pane -T '%%'"

# ── Session/window utilities ─────────────────────────────
# Choose tree
unbind T
bind T choose-tree

# Toggle status bar
bind G set status

# List keys
unbind ?
bind ? list-keys

# List windows
unbind w
bind w list-windows

# Detach
unbind ^D
bind ^D detach

# Refresh client
unbind ^L
bind ^L refresh-client

# ── Config management ────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded"
bind e split-window -h "nvim ~/.config/tmux/tmux.conf"

# ── Claude Code integration ──────────────────────────────
# Cycle Claude Code statusline theme
bind u run-shell -b "~/.claude/theme-cycle.sh > /dev/null 2>&1" \; send-keys "!" Escape

# ── Emoji picker (tmux-text-macros: prefix + ;) ─────────
# Plugin binds prefix + ; by default (fzf emoji/macro picker)
# Custom macros: ~/.tmux/custom-macros (optional)

# ── Copy mode (Wayland — wl-copy) ────────────────────────
setw -g mode-keys vi
setw -g xterm-keys on
set -s set-clipboard off

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'
