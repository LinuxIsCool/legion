# settings.conf — terminal, shell, rendering
# Ported from old settings.tmux with enhancements for nvim + modern tmux

# Shell
set -g default-shell /usr/bin/fish

# Terminal + true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Sixel graphics passthrough (tmux 3.4+)
set -g allow-passthrough on
set -ga terminal-overrides ',*:Sixel=1'

# No lag after ESC — critical for nvim
set -sg escape-time 0

# Focus events — nvim autocommands need this
set -g focus-events on

# Reduce status redraw churn so native terminal selection survives.
set -g status-interval 5

# History
set -g history-limit 50000

# Window/pane numbering from 1
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't auto-rename windows
set -g allow-rename off

# Turn off visual bell
set -g visual-bell off
