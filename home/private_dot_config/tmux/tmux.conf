# Legion tmux config — XDG: ~/.config/tmux/tmux.conf
# Modular: settings → keys → mouse → plugins (TPM must run last)

source-file ~/.config/tmux/settings.conf
source-file ~/.config/tmux/keys.conf
source-file ~/.config/tmux/mouse.conf
source-file ~/.config/tmux/plugins.conf

# Runtime-generated plugin config (indicator format strings, hooks).
# Generated by claude-tmux-setup.sh, ignored by chezmoi.
# Overrides format strings from plugins.conf with indicator-injected versions.
# On fresh machines this file doesn't exist yet — if-shell guard skips it.
if-shell '[ -f ~/.config/tmux/plugins-dynamic.conf ]' \
  'source-file ~/.config/tmux/plugins-dynamic.conf'


# Toggle pane-id display at top border (prefix + I)
set -g pane-border-status top
set -g pane-border-format ' #[fg=yellow,bold]#{pane_id}#[default] │ idx #{pane_index} │ #{pane_current_command} │ #{pane_width}x#{pane_height} '
bind-key I set-option pane-border-status
